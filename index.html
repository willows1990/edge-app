<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Racing Edge</title>
<!-- PWA support -->
<meta content="#061017" name="theme-color"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Racing Edge" name="apple-mobile-web-app-title"/>
<link href="manifest.json" rel="manifest"/>
<link href="icons/icon-192.png" rel="apple-touch-icon"/>
<link href="styles.css" rel="stylesheet"/>

<!-- PATCH v1.4.1 - consolidated place pills, shop pills, EV scale -->

<!-- PATCH v1.5.2 - selection expanded layout polish -->

<!-- PATCH v1.5.5 - universal secondary header pills -->

<!-- PATCH v1.5.6 - simplified selections hierarchy -->



<!-- PATCH v2.0.1 - reduced bet maker animations -->


</head>
<body>
<main class="app">
<section class="screen active" id="marketsScreen">
<section class="topbar">
<div class="title-wrap">
<select class="book-select" id="shopSelect">
<option value="wh_shop">William Hill Shop</option>
<option value="bf_shop">Betfred Shop</option>
<option value="lads_shop">Ladbrokes Shop</option>
</select>
</div>
<div class="right-tools">
<div class="stat-card">
<div class="stat blue"><strong id="runnerCount">0</strong><span>Runners</span></div>
<div class="stat green"><strong id="meetingCount">0</strong><span>Meetings</span></div>
</div>
<button class="icon-btn refresh-disabled" id="refreshBtn" type="button">↻</button>
</div>
</section>
<section class="market-controls-row">
<section class="edge-shell">
<label for="edgeSelect">Edge</label>
<select id="edgeSelect"></select>
</section>
<section class="filters-shell">
<button class="filters-toggle" id="filtersToggle" type="button">⚙ Filters <span>›</span></button>
</section>
<div class="filters-panel" id="filters">
<div class="mixed-filter-tabs" id="mixedFilterTabs" style="display:none;">
<button class="mixed-filter-tab active" data-mixed-filter-tab="horse" type="button">Horses</button>
<button class="mixed-filter-tab" data-mixed-filter-tab="golf" type="button">Golf</button>
</div>
<div class="field">
<label>Meet</label>
<select id="meetFilter"><option value="">All Meets</option></select>
</div>
<div class="field">
<label>Time</label>
<select id="timeFilter"><option value="">All Times</option></select>
</div>
<div class="field">
<label>Min Odds</label>
<input id="minOdds" max="1001" min="0" type="number" value="1"/>
</div>
<div class="field">
<label>Max Odds</label>
<input id="maxOdds" max="1001" min="0" type="number" value="41"/>
</div>
<div class="field">
<label>Min EV %</label>
<input id="minEv" type="number" value="0"/>
</div>
<div class="field">
<label>Min Place EV %</label>
<input id="minPlaceEv" type="number" value="0"/>
</div>
<div class="field dg-filter-field" style="display:none;">
<label>DG</label>
<button aria-pressed="true" class="dg-toggle on" id="dgFilter" type="button" value="on">
<span class="dg-toggle-knob"></span>
<span class="dg-toggle-text">On</span>
</button>
</div>
<div class="filter-actions">
<button class="clear" id="clearFilters" type="button">↻ Clear</button>
<button class="clear apply-filters" disabled="" id="applyFilters" type="button">✓ Apply</button>
</div>
</div>
</section>
<div class="update-sort-row">
<p class="updated">Last Updated: 19 Jun 2026 13:10:56</p>
<label class="sort-wrap">Sort
        <select id="sortBy">
<option value="totalEv">Total EV</option>
<option value="placeEv">Place EV</option>
</select>
</label>
</div>
<section class="feed-scroll">
<div class="header-row">
<span>Save</span><span>Horse</span>
<span>Odds</span><span>P/T</span><span id="marketEvHeader">Total EV %</span>
</div>
<div id="feed"></div>
</section>
</section>
<section class="screen" id="selectionsScreen">
<section class="topbar">
<div class="title-wrap">
<select class="book-select">
<option>My Selections</option>
</select>
</div>
</section>
<p class="updated">Saved horses appear here.</p>
<div aria-label="Selection EV display" class="selection-view-toggle" role="group">
<button class="selection-view-btn active" data-selection-ev="totalEv" onclick="setSelectionEvMetric('totalEv')" type="button">Total EV</button>
<button class="selection-view-btn" data-selection-ev="placeEv" onclick="setSelectionEvMetric('placeEv')" type="button">Place EV</button>
</div>
<section class="feed-scroll">
<div class="header-row selections-header-row">
<span>#</span><span>Horse</span>
<span>Odds</span><span>P/T</span><span id="selectionEvHeader">Total EV %</span>
</div>
<div id="selectionsFeed"></div>
</section>
</section>
<section class="screen" id="betmakerScreen">
<section class="bet-card">
<div class="calc-mode-toggle">
<button class="calc-mode active" data-calc-mode="basic" type="button">Basic</button>
<button class="calc-mode" data-calc-mode="advanced" type="button">Advanced</button>
</div>
<div class="bet-grid">
<div class="field">
<label>Bet Type</label>
<select id="betType">
<option value="single">Single</option>
<option value="double">Double</option>
<option value="treble">Treble</option>
<option value="fourfold">4 Fold</option>
<option value="fivefold">5 Fold</option>
<option value="sixfold">6 Fold</option>
<option value="sevenfold">7 Fold</option>
<option value="trixie">Trixie</option>
<option value="patent">Patent</option>
<option value="yankee">Yankee</option>
<option value="lucky15">Lucky 15</option>
<option value="lucky31">Lucky 31</option>
<option value="lucky63">Lucky 63</option>
<option value="canadian">Canadian</option>
<option value="heinz">Heinz</option>
<option value="superheinz">Super Heinz</option>
<option value="goliath">Goliath</option>
</select>
</div>
<div class="field">
<label>Stake Per Line</label>
<input autocomplete="off" enterkeyhint="done" id="betStake" inputmode="decimal" pattern="[0-9]*[.]?[0-9]*" placeholder="£1.00" type="text" value="1.00"/>
</div>
<button class="clear ew-toggle on" id="ewToggle" type="button">E/W ON</button>
<div class="advanced-combo-title">Combo Matrix</div>
<div class="combo-options" id="comboOptions">
<div class="field">
<label># Selections</label>
<select id="comboPickCount">
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option selected="" value="6">6</option>
<option value="7">7</option>
</select>
</div>
<div class="combo-checks" id="comboChecks"></div>
<div class="advanced-stake-rows" id="advancedStakeRows"></div>
</div>
</div>
</section>
<section class="bet-card bet-builder-card">
<div class="bet-maker-selection-head">
<h3 class="bet-heading">Selections</h3>
<div class="bet-fill-inline">
<div class="bet-fill-actions">
<button class="mini-btn fill-source active" data-source="market" type="button">Market</button>
<button class="mini-btn fill-source" data-source="selections" type="button">Selections</button>
</div>
</div>
</div>
<div class="bet-fill-context" id="betFillContext"></div>
<div id="betSelectionRows"></div>
<div class="autofill-actions bet-autofill-wide">
<button class="mini-btn" data-autofill="bestEv" type="button">Best EV</button>
<button class="mini-btn" data-autofill="bestPlace" type="button">Best Place</button>
<button class="mini-btn" data-autofill="random" type="button">Random</button>
</div>
</section>
<section class="bet-card">
<h3 class="bet-heading">Summary</h3>
<div class="bet-summary" id="betSummary"></div>
</section>
<section class="bet-card bet-actions-card">
<button class="clear save-bet" id="saveBetSlip" type="button">Save</button>
<button class="clear clear-bet" id="clearBetMaker" type="button">Clear</button>
</section>
<section class="bet-card">
<h3 class="bet-heading">Matrix</h3>
<div id="betMatrix"></div>
</section>
</section>
<section class="screen" id="mybetsScreen">
<section class="bet-card">
<h3 class="bet-heading">My Bets</h3>
<div class="mybets-feed" id="myBetsFeed"></div>
</section>
</section>
</main>
<div class="toast-banner" id="toastBanner">Added to My Bets</div>
<nav class="bottom-nav">
<div class="nav-item active" data-nav="markets"><div>▥</div>Markets</div>
<div class="nav-item" data-nav="selections"><div>☆</div><span class="nav-label">Selections (0)</span></div>
<div class="nav-item" data-nav="betmaker"><div>▦</div>Bet Maker</div>
<div class="nav-item" data-nav="mybets"><div>▤</div><span class="nav-label">My Bets (0)</span></div>
</nav>
<script src="app.js"></script>

</body>
</html>
